<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Story ❤️</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Background -->

<div class="background"></div>

<!-- Intro -->

<section id="intro">

    <div class="overlay"></div>

    <div class="content">

        <h1 class="logo">
            OUR STORY
        </h1>

        <p class="subtitle">
            Every Love Story Has A Beginning
        </p>

        <button id="startBtn">
            SIGN IN
        </button>

    </div>

</section>

<!-- Login -->

<section id="login">

    <div class="login-card">

        <h2>Unlock Our Story ❤️</h2>

        <input
            type="text"
            id="love"
            placeholder="Who is the love of my life?"
        >

        <input
            type="password"
            id="date"
            placeholder="When did our story begin? (MMDDYYYY)"
        >

        <button id="loginBtn">
            ❤️ Unlock ❤️
        </button>

        <p id="error"></p>

    </div>

</section>

<script src="js/script.js"></script>

</body>

</html>
